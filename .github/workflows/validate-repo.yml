name: validate-repo

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install tools
        run: pacman -Sy --noconfirm git pacman-contrib diffutils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository metadata
        run: |
          set -eu
          cd /__w/mjiang-extras/mjiang-extras

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          cp x86_64/mjiang-extras.db.tar.gz "$tmp/original.db.tar.gz"
          cp x86_64/mjiang-extras.files.tar.gz "$tmp/original.files.tar.gz"

          repo-add x86_64/mjiang-extras.db.tar.gz x86_64/*.pkg.tar.zst

          mkdir -p "$tmp/original-db" "$tmp/rebuilt-db" "$tmp/original-files" "$tmp/rebuilt-files"
          tar -xzf "$tmp/original.db.tar.gz" -C "$tmp/original-db"
          tar -xzf x86_64/mjiang-extras.db.tar.gz -C "$tmp/rebuilt-db"
          tar -xzf "$tmp/original.files.tar.gz" -C "$tmp/original-files"
          tar -xzf x86_64/mjiang-extras.files.tar.gz -C "$tmp/rebuilt-files"

          diff -ru "$tmp/original-db" "$tmp/rebuilt-db"
          diff -ru "$tmp/original-files" "$tmp/rebuilt-files"
